name: macOS Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build macOS .dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # skip Developer ID signing; falls back to ad-hoc
          GITHUB_SHA: ${{ github.sha }}
          APP_VERSION: ${{ github.ref_name }} # the tag, e.g. v1.1.0
        run: |
          VERSION="${GITHUB_REF_NAME#v}" # strip leading v → 1.1.0
          npm run build:mac -- -c.extraMetadata.version="$VERSION"

      - name: Create GitHub Release + attach .dmg
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true # auto changelog from commits / PRs
          files: dist/*.dmg
